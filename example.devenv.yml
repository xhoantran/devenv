name: new-wave

system:
  packages: [make]

repos:
  core-infra:
    url: https://github.com/xhoantran/new-wave-core-infra
    branch: main
  api:
    url: https://github.com/xhoantran/new-wave-api
    branch: main
  ui:
    url: https://github.com/xhoantran/new-wave-ui
    branch: main
  video-matcher:
    url: https://github.com/xhoantran/new-wave-video-matcher
    branch: main

services:
  supabase:
    type: supabase
    config: ${repos.core-infra}/supabase

  localstack:
    image: localstack/localstack-pro
    ports: ["4566:4566"]
    env:
      LOCALSTACK_AUTH_TOKEN: ${LOCALSTACK_AUTH_TOKEN}

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    ready: redis-cli ping

projects:
  core-infra:
    repo: core-infra
    runtime: node
    setup: make all
    run: skip
    depends_on: [supabase, localstack]

  api:
    repo: api
    runtime: java
    setup: ./mvnw clean package -DskipTests
    run: ./mvnw spring-boot:run
    port: 8080
    depends_on: [supabase, redis, localstack]
    env:
      SPRING_PROFILES_ACTIVE: local
      SUPABASE_URL: ${supabase.url}
      SPRING_DATASOURCE_URL: ${supabase.db_url}
      SPRING_DATA_REDIS_HOST: localhost
      SPRING_DATA_REDIS_PORT: "6379"
      CLOUD_AWS_ENDPOINT_URI: http://localhost:4566
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GOOGLE_GENAI_API_KEY: ${GOOGLE_GENAI_API_KEY}

  ui:
    repo: ui
    runtime: node
    setup: npm install --include=dev
    run: npm run dev
    port: 5173
    depends_on: [api]
    env:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_SUPABASE_URL: ${supabase.url}
      VITE_SUPABASE_ANON_KEY: ${supabase.anon_key}

  video-matcher:
    repo: video-matcher
    runtime: python
    setup: pip install -r requirements.txt
    run: skip
